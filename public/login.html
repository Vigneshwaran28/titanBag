<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TitanBag Admin Authentication</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-dark: #07090e;
      --bg-card: #0f131a;
      --border-color: #1e2633;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --color-primary: #6366f1;
      --color-primary-glow: rgba(99, 102, 241, 0.15);
      --color-delete: #ef4444;
      --color-delete-glow: rgba(239, 68, 68, 0.1);
      
      --font-outfit: 'Outfit', sans-serif;
      --font-inter: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-inter);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background blur */
    body::before {
      content: '';
      position: absolute;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 1.5rem;
    }

    .login-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.25rem 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary), #8b5cf6);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon-box {
      background: linear-gradient(135deg, var(--color-primary), #8b5cf6);
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      margin-bottom: 0.75rem;
    }

    .logo-icon-box i {
      color: white;
      font-size: 1.5rem;
    }

    .logo-title {
      font-family: var(--font-outfit);
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-subtitle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      top: 50%;
      left: 0.85rem;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      background-color: #07090e;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-glow);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--color-primary), #8b5cf6);
      color: white;
      border: none;
      padding: 0.85rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
      margin-top: 1.75rem;
    }

    .btn-login:hover {
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .alert-error {
      background-color: var(--color-delete-glow);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--color-delete);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 1.25rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      background-color: white;
      border-radius: 50%;
      animation: pulse-loader 1.2s infinite;
    }

    @keyframes pulse-loader {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-section">
        <div class="logo-icon-box">
          <i data-lucide="shield-alert"></i>
        </div>
        <h1 class="logo-title">TitanBag</h1>
        <p class="logo-subtitle">Secure Gateway Administration</p>
      </div>

      <div class="alert-error" id="error-box">
        <i data-lucide="alert-circle" size="16" style="flex-shrink: 0;"></i>
        <span id="error-message">Invalid admin credentials.</span>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Super User</label>
          <div class="input-wrapper">
            <i data-lucide="user" size="16"></i>
            <input type="text" id="username" class="form-input" placeholder="Enter super_user name" required autocomplete="username">
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 0.75rem;">
          <label class="form-label" for="password">Authenticate Key (UUID)</label>
          <div class="input-wrapper">
            <i data-lucide="key" size="16"></i>
            <input type="password" id="password" class="form-input" placeholder="00000000-0000-0000-0000-000000000000" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-login" id="submit-btn">
          <span>Authorize Access</span>
          <i data-lucide="arrow-right" size="16"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Check if already authenticated
    if (localStorage.getItem('god_token')) {
      window.location.replace('/dashboard');
    }

    function handleLogin(event) {
      event.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const errorBox = document.getElementById('error-box');
      const errorMessage = document.getElementById('error-message');

      // Clear previous error
      errorBox.style.display = 'none';

      // UI loading state
      submitBtn.disabled = true;
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="loader-dot"></span><span>Authenticating...</span>';

      fetch('/api/god/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          username: usernameInput.value,
          password: passwordInput.value
        })
      })
      .then(async res => {
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || 'Authentication failed');
        }
        return data;
      })
      .then(data => {
        // Save admin token and redirect to dashboard
        localStorage.setItem('god_token', data.token);
        window.location.replace('/dashboard');
      })
      .catch(err => {
        // Show error message
        errorMessage.innerText = err.message;
        errorBox.style.display = 'flex';
        
        // Reset UI state
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
        lucide.createIcons();
      });
    }
  </script>
</body>
</html>
