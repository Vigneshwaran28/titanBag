<div class="auth-page">
  <div class="back-home-container" *ngIf="!successMessage">
    <a routerLink="/login" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Back to Login
    </a>
  </div>

  <div class="auth-card card">
    <div class="logo-section">
      <div class="logo-icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h2 class="auth-title">Update Password</h2>
      <p class="auth-subtitle">Verify your secure token to establish new wallet credentials</p>
    </div>

    <!-- Alert Box -->
    <div class="alert-error" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Success Box -->
    <div class="alert-success" *ngIf="successMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>{{ successMessage }} Redirecting in 3 seconds...</span>
    </div>

    <form (submit)="handleSubmit($event)" *ngIf="token && !successMessage">
      <div class="form-group">
        <label class="form-label" for="reset-pwd">New Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="reset-pwd" name="password" class="form-input" [(ngModel)]="password" placeholder="At least 8 characters" required autocomplete="new-password">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-pwd">Confirm New Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirm-pwd" name="confirmPassword" class="form-input" [(ngModel)]="confirmPassword" placeholder="Re-enter new password" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Save Password</span>
        <span *ngIf="isSubmitting" class="loader-dot"></span>
        <span *ngIf="isSubmitting">Updating...</span>
      </button>
    </form>
  </div>
</div>
